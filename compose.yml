services:
  polyman:
    environment:
      # required wallet/env keys
      WALLET_ADDRESS: ""
      PRIVATE_KEY: ""
      RPC_URL: "https://polygon.publicnode.com"
      SIGNATURE_TYPE: "proxy"

      # runtime
      POLL_INTERVAL_S: "2"
      STATE_FILE: "/data/manager-state.json"
      WORKER_COUNT: "5"
      WORKER_TIMEOUT_S: "60"
      WORKER_MAX_RETRIES: "5"
      RESULT_DIR: "/data/polyman-results"
      LOSER_SWEEP_TO: ""

      # risk management
      MAX_LOSS_PCT: "0"
      SL_SET_TO: "50"
      TS_TRIGGER_AT: "25"
      TS_MOVE_EACH: "20"

      # optional take profits (set to 0 to disable)
      TP1_TRIGGER_PCT: "0"
      TP1_CLOSE_PCT: "0"
      TP2_TRIGGER_PCT: "0"
      TP2_CLOSE_PCT: "0"

      # redeem winners automatically
      CLOSE_ON_REDEEMABLE: "1"
